<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A lightweight animated 3D portfolio landing page that runs without external dependencies."
    />
    <title>3D Portfolio</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-copy" aria-labelledby="page-title">
        <p class="eyebrow">Interactive 3D Portfolio</p>
        <h1 id="page-title">Building immersive products for the web.</h1>
        <p class="intro">
          A dependency-free starter that pairs a polished landing page with an animated
          CSS 3D scene, ready for projects, case studies, and contact links.
        </p>
        <div class="actions" aria-label="Portfolio actions">
          <a class="button primary" href="mailto:hello@example.com">Contact me</a>
          <a class="button secondary" href="#featured-work">View work</a>
        </div>
      </section>

      <section class="scene-card" aria-label="Animated portfolio object">
        <div class="orbital-scene" aria-hidden="true">
          <div class="cube">
            <span class="face face-front"></span>
            <span class="face face-back"></span>
            <span class="face face-right"></span>
            <span class="face face-left"></span>
            <span class="face face-top"></span>
            <span class="face face-bottom"></span>
          </div>
          <span class="orbit orbit-one"></span>
          <span class="orbit orbit-two"></span>
          <span class="orbit orbit-three"></span>
          <span class="spark spark-one"></span>
          <span class="spark spark-two"></span>
          <span class="spark spark-three"></span>
        </div>
      </section>

      <section id="featured-work" class="stats" aria-label="Portfolio highlights">
        <article>
          <strong>12+</strong>
          <span>Product launches</span>
        </article>
        <article>
          <strong>8</strong>
          <span>3D web builds</span>
        </article>
        <article>
          <strong>99%</strong>
          <span>Performance focus</span>
        </article>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
